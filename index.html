            script.onload = resolve;
            script.onerror = () => reject(new Error("Failed to load script: " + src));

        document.getElementById("label-movesLeft").innerText = translations[currentLanguage].movesLeft;

    function getLocalDateSeed(date = new Date()) {
        const y = date.getFullYear();
        const m = date.getMonth() + 1; // 1 to 12
        const d = date.getDate(); // 1 to 31
        return ((y * 10000 + m * 100 + d) >>> 0); // example: 20260101
    }

    // Date helpers (local time)
    function addDays(date, deltaDays) {
        const d = new Date(date);
        d.setDate(d.getDate() + deltaDays);
        return d;
    }

    // 32-bit FNV-1a hash (deterministic across browsers)
    function hash32(str) {
        let h = 0x811c9dc5;
        for (let i = 0; i < str.length; i++) {
            h ^= str.charCodeAt(i);
            h = Math.imul(h, 0x01000193);
        }
        return h >>> 0;
    }

    // Days since a fixed local-date epoch.
    // Using local midnight avoids DST/time-of-day issues.
    function getLocalDayNumber(date = new Date()) {
        const midnight = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const epoch = new Date(2020, 0, 1); // Jan 1, 2020 (local)
        return Math.floor((midnight - epoch) / 86400000);
    }

    let _dailyPermutation = null;
    let _dailyPermutationLen = 0;

    function getDailyPermutation(wordsLen) {
        if (_dailyPermutation && _dailyPermutationLen === wordsLen) return _dailyPermutation;

        const arr = Array.from({ length: wordsLen }, (_, i) => i);

        // Seed is stable across days, but different per language.
        const seed = (hash32(String(currentLanguage || "eng")) ^ 0xA5A5A5A5) >>> 0;

        _dailyPermutation = seededShuffle(arr, seededRandom(seed));
        _dailyPermutationLen = wordsLen;
        return _dailyPermutation;
    }

    function getDailySolution() {
        const today = new Date(); // local time
        const n = gameWords.length;
        if (!n) return null;

        const dayNum = getLocalDayNumber(today);
        const perm = getDailyPermutation(n);

        let index = perm[((dayNum % n) + n) % n];

        // Guarantee: if n >= 8, this permutation approach cannot repeat within the last 7 days.
        // If n <= 7, that guarantee is mathematically impossible. This is best-effort.
        if (n > 1 && n <= 7) {
            const recent = new Set();
            const window = Math.min(7, n - 1);

            for (let i = 1; i <= window; i++) {
                const dn = getLocalDayNumber(addDays(today, -i));
                const idx = perm[((dn % n) + n) % n];
                recent.add(idx);
            }

            if (recent.has(index)) {
                // Deterministically walk forward until we find one not in the recent set.
                for (let step = 1; step < n; step++) {
                    const candidate = perm[(((dayNum + step) % n) + n) % n];
                    if (!recent.has(candidate)) {
                        index = candidate;
                        break;
                    }
                }
            }
        }

        // dailySeed drives the rest of the puzzle randomness (columns, shuffles).
        // Mix in the chosen index so it changes with the word too.
        dailySeed = (getLocalDateSeed(today) ^ ((index + 1) * 0x9e3779b9)) >>> 0;

        return gameWords[index];
    }

    function setCookie(name, value, days) {
        let expires = "";
        if (days) {
            const date = new Date();
            date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "") + expires + "; path=/";
    }

    function getCookie(name) {
        const nameEQ = name + "=";
        const ca = document.cookie.split(";");
        for (let i = 0; i < ca.length; i++) {
            let c = ca[i];
            while (c.charAt(0) === " ") c = c.substring(1, c.length);
            if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
        }
        return null;
    }

    function deleteCookie(name) {

    function updateStreakDisplay() {

    function updateGameResult(result) {
        const todayStr = getTodayStr();
        if (getLangCookie("DSG_lastPlayed") === todayStr) return;
        const previousStreak = parseInt(getLangCookie("DSG_streak") || "0", 10);
        const previousWinStreak = parseInt(getLangCookie("DSG_winStreak") || "0", 10);
        const newStreak = previousStreak + 1;
        const newWinStreak = result === "win" ? previousWinStreak + 1 : 0;
        setLangCookie("DSG_lastPlayed", todayStr, 365);
        setLangCookie("DSG_streak", newStreak, 365);
        setLangCookie("DSG_winStreak", newWinStreak, 365);
        setLangCookie("DSG_lastResult", result, 365);
        updateStreakDisplay();
        dailyResult = result;
        saveGameState();

        // Update the logo level based on result:
        updateLogoLevel(result);
    }

    function saveGameState() {
        var state = {
            columns: columns,
            guesses: guesses,
            currentGuessIndex: currentGuessIndex,
            columnOrder: columnOrder,
            outcome: dailyResult,
            guessRows: guessRows
        };
        setLangCookie("DSG_gameState", JSON.stringify(state), 365);
    }

    function restoreGameState(state) {
        solution = getDailySolution();
        columns = state.columns;
        guesses = state.guesses;
        currentGuessIndex = state.currentGuessIndex;
        columnOrder = state.columnOrder;
        dailyResult = state.outcome;
        guessRows = state.guessRows || guessRows;
        // Reset any active move upon restoring the game.
        activeMove = null;
        // Clear sets before repopulating
        eliminatedLetters.clear();
        foundLetters.clear();
        generateGuessBoard();
        for (let row = 1; row <= guessRows; row++) {
            if (!guesses[row]) continue;
            const guessStr = guesses[row].join("");
            if (guessStr.length === 5) {
                const feedback = checkGuess(guessStr, solution);
                for (let col = 0; col < 5; col++) {
                    const tile = document.getElementById(`tile-${row}-${col}`);
                    if (tile) {
                        tile.innerText = guesses[row][col];
                        if (row === currentGuessIndex && dailyResult === "win") {
                            tile.classList.add("win");
                        } else {
                            tile.classList.add(feedback[col]);
                        }
                    }
                    // Repopulate sets
                    const letter = guesses[row][col];
                    if (feedback[col] === "correct" || feedback[col] === "misplaced") {
                        foundLetters.add(letter);
                    }
                    if (feedback[col] === "wrong") {
                        eliminatedLetters.add(letter);
                    }
                }
            }
        }
        drawColumns(); // Re-draw columns to show eliminated/found/selected states
        const boardEl = document.getElementById("board");
        boardEl.style.display = "flex";
        boardEl.classList.remove("hidden-board");
        boardEl.classList.add("visible");

        if (gameCompleted) {
            const solWord = (typeof solution === "object" && solution.word) ? solution.word : solution;
            let message = "";
            if (dailyResult === "win") {
                message = translations[currentLanguage].foundIt + "<br /><span class='winning-answer'>" +
                    translations[currentLanguage].winningWord + solWord + "</span>";
            } else {
                message = translations[currentLanguage].shucks + "<br /><span class='winning-answer'>" +
                    translations[currentLanguage].winningWord + solWord + "</span>";
            }
            // For non‑English languages, append the definition (if available) and a link to open the lesson modal.
            if (currentLanguage !== "eng" && typeof solution === "object" && solution.definition) {
                message += "<span class=\"winning-answer\"><br>" + solution.definition;
                message += " <br><a href='#' class='lesson-link' onclick=\"showModal('" +
                    solution.lesson.replace(/'/g, "\\'") + "', false); return false;\">Open Word Lesson!</a></span><br /><br />";
            }

            document.getElementById("instructions").style.display = "none";
            //document.getElementById("guess-button-container").style.display = "none";
            removeGuessButton(message);
            hideLetterSelectionArea();
            // Restore the result card too, so revisiting the page mid-day shows the answer.
            renderResultCard(dailyResult === "win" ? "win" : "lose", currentGuessIndex);
        }
    }


    function lockGameForToday(fromLoad) {
        const todayStr = getTodayStr();
        if (getLangCookie("DSG_lastPlayed") === todayStr) {
            if (fromLoad) {
                var stateStr = getLangCookie("DSG_gameState");
                if (stateStr) {
                    var state = JSON.parse(stateStr);
                    gameCompleted = true;
                    restoreGameState(state);
                } else {
                    const result = getLangCookie("DSG_lastResult") || "";
                    let solWord = (typeof solution === "object" && solution.word) ? solution.word : solution;
                    let message = translations[currentLanguage].already;
                    if (result === "win" || result === "lose") {
                        message += "<br><span class='winning-answer'>" + translations[currentLanguage].winningWord + solWord + "</span>";
                    }

    function seededRandom(seed) {
        let x = (seed >>> 0);
        if (x === 0) x = 0x9e3779b9; // any non-zero constant
        return function() {
            x ^= x << 13;
            x ^= x >>> 17;
            x ^= x << 5;
            return (x >>> 0) / 4294967296;
        };
    }

    function seededShuffle(array, rand) {
        const arr = array.slice();
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(rand() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function generateColumnsFromWinningWord(winningWord, seed) {
        if (typeof winningWord === "object" && winningWord.word) winningWord = winningWord.word;

        const rand = seededRandom(seed);
        const cols = [];

        for (let i = 0; i < winningWord.length; i++) {
            const letter = winningWord[i];
            const col = [letter];

            let guard = 0;
            while (col.length < 5) {
                if (guard++ > 200) {
                    // fallback: fill deterministically so it never hangs
                    for (let k = 0; col.length < 5 && k < currentAlphabet.length; k++) {
                        const c = currentAlphabet.charAt(k);
                        if (!col.includes(c)) col.push(c);
                    }
                    break;
                }

                const index = Math.floor(rand() * currentAlphabet.length);
                const candidate = currentAlphabet.charAt(index);
                if (!col.includes(candidate)) col.push(candidate);
            }

            cols.push(seededShuffle(col, rand));
        }

        return cols;
    }

    // --- Generate the guess board dynamically based on guessRows ---
    function generateGuessBoard() {
        const board = document.getElementById("board");
        board.innerHTML = "";
        for (let row = 1; row <= guessRows; row++) {
            const rowDiv = document.createElement("div");
            rowDiv.className = "guess-row";
            rowDiv.id = `guess-row-${row}`;
            for (let col = 0; col < 5; col++) {
                const tile = document.createElement("div");
                tile.className = "tile";
                tile.id = `tile-${row}-${col}`;
                rowDiv.appendChild(tile);
            }
            board.appendChild(rowDiv);
        }
    }

    function clearGuessBoard() {
        for (let row = 1; row <= guessRows; row++) {
            for (let col = 0; col < 5; col++) {
                const tile = document.getElementById(`tile-${row}-${col}`);
                if (tile) {
                    tile.innerText = "";
                    tile.className = "tile";
                }
            }
        }
    }
    let solution, columns, columnOrder, movesLeft, currentGuessIndex, guesses;

    function initGame() {
        // Clear any active move state when starting a new game.
        activeMove = null;
        initVariables();
        updateMovesLeft();
        clearGuessBoard();
        drawColumns();
        generateGuessBoard();
        createGuessButton();
        document.getElementById("game-status").innerText = "";
        const board = document.getElementById("board");
        board.classList.add("hidden-board");
        board.classList.remove("visible");
        const container = document.getElementById("columns-container");
        container.classList.remove("hidden");
        trackGameStart(); // Track that a game has started
    }

    function initVariables() {
        solution = getDailySolution();
        gameCompleted = false;
        columns = generateColumnsFromWinningWord(solution, dailySeed);
        let rand = seededRandom(dailySeed + 1);
        columnOrder = seededShuffle([0, 1, 2, 3, 4], rand);

        // Ensure the columns are not already in the winning order.
        // If they are, shuffle again with a modified seed until they are not.
        let attempts = 0;
        while (JSON.stringify(columnOrder) === JSON.stringify([0, 1, 2, 3, 4]) && attempts < 10) {
            rand = seededRandom(dailySeed + 1 + (++attempts));
            columnOrder = seededShuffle([0, 1, 2, 3, 4], rand);
        }

        let winStreakCookie = parseInt(getLangCookie("DSG_winStreak") || "0", 10);
        movesLeft = Math.max(startingMoves - (winStreakCookie * streakMovesReduction), minMoves);

        // Reset sets
        eliminatedLetters = new Set();
        foundLetters = new Set();

        // Determine the number of guess rows based on win streak.
        if (winStreakCookie >= WIN_STREAK_THRESHOLD_2_ROWS) {
            guessRows = 2;
        } else if (winStreakCookie >= WIN_STREAK_THRESHOLD_3_ROWS) {
            guessRows = 3;
        } else if (winStreakCookie >= WIN_STREAK_THRESHOLD_4_ROWS) {
            guessRows = 4;
        } else {
            guessRows = 5;
        }


        currentGuessIndex = 1;
        guesses = {};
        for (let r = 1; r <= guessRows; r++) {
            guesses[r] = [null, null, null, null, null];
        }
    }

    // Compute the temporary order if a move is active.
    function computeDisplayOrder() {
        // If no move is active, simply return a copy of columnOrder.
        if (!activeMove) {
            return columnOrder.slice();
        } else {
            // Make a copy of the permanent column order.
            let tempOrder = columnOrder.slice();
            // Remove the moving column from its original position.
            let moving = tempOrder.splice(activeMove.origDisplayPos, 1)[0];
            // Insert the moving column at the new temporary display position.
            tempOrder.splice(activeMove.newDisplayPos, 0, moving);
            return tempOrder;
        }
    }

    // Helper function to update the displayed guess row.
    function updateGuessRowDOM() {
        const row = guesses[currentGuessIndex] || [];
        for (let col = 0; col < row.length; col++) {
            const tile = document.getElementById(`tile-${currentGuessIndex}-${col}`);
            if (tile) {
                tile.innerText = row[col] || "";
            }
        }
    }
    // Given the old order, old guess row, and new order, build the new guess row.
    function updateGuessRowAfterDrag(oldOrder, oldGuess, newOrder) {
        let newGuess = [];
        newOrder.forEach(actualColIndex => {
            // Find where this column was in the old order.
            const oldIndex = oldOrder.indexOf(actualColIndex);
            // If there was a guessed letter for that column, use it; otherwise null.
            newGuess.push(oldGuess[oldIndex] !== undefined ? oldGuess[oldIndex] : null);
        });
        return newGuess;
    }


    function drawColumns() {
        const container = document.getElementById("columns-container");
        container.innerHTML = "";

        // Destroy the previous instance if it exists.
        if (sortableInstance) {
            sortableInstance.destroy();
            sortableInstance = null;
        }

        // Loop through the current permanent order
        columnOrder.forEach((actualColIndex, displayPos) => {
            const wrapper = document.createElement("div");
            wrapper.className = "column-wrapper";
            wrapper.dataset.colIndex = actualColIndex;




            // Create drag-handle element.
            const dragHandle = document.createElement("div");
            dragHandle.className = "drag-handle";
            dragHandle.innerHTML = movesLeft > 0 ? "&#x2190; &#x2192;" : "X";
            if (movesLeft <= 0) {
                dragHandle.classList.add("disabled");
            }
            wrapper.appendChild(dragHandle);

            // Create the column of letters.
            const colDiv = document.createElement("div");
            colDiv.className = "column";
            columns[actualColIndex].forEach(letter => {
                const cell = document.createElement("div");
                cell.className = "letter-cell";
                cell.innerText = letter;
                // Apply feedback styling if needed
                if (eliminatedLetters.has(letter) && !foundLetters.has(letter)) {
                    cell.classList.add("eliminated");
                }
                if (foundLetters.has(letter)) {
                    cell.classList.add("found");
                }
                // Check if this letter is currently selected in this column
                if (!gameCompleted && guesses[currentGuessIndex] && guesses[currentGuessIndex][displayPos] === letter) {
                    cell.classList.add("selected");
                }
                // When clicking a letter, add it to the guess.
                cell.addEventListener("click", function() {
                    const wrapper = this.closest(".column-wrapper");
                    // Compute current position from the parent container
                    const currentDisplayPos = Array.from(wrapper.parentNode.children).indexOf(wrapper);
                    addLetterToGuess(currentDisplayPos, letter);
                });

                colDiv.appendChild(cell);
            });
            wrapper.appendChild(colDiv);
            container.appendChild(wrapper);
        });

        // Initialize SortableJS on the container.
        sortableInstance = Sortable.create(container, {
            animation: 150,
            handle: ".drag-handle",
            forceFallback: true,
            disabled: movesLeft <= 0,
            onStart: function(evt) {
                if (movesLeft <= 0) {
                    evt.preventDefault();
                    return;
                }
                evt.item.classList.add("dragging");
            },
            onEnd: function(evt) {
                evt.item.classList.remove("dragging");
                const container = document.getElementById("columns-container");
                const oldOrder = columnOrder.slice();
                const oldGuess = guesses[currentGuessIndex] ? guesses[currentGuessIndex].slice() : [];

                let newOrder = [];
                Array.from(container.children).forEach(child => {
                    newOrder.push(parseInt(child.dataset.colIndex, 10));
                });

                if (arraysEqual(newOrder, oldOrder)) {
                    drawColumns();
                    return;
                }
                trackColumnMoved();

                // If the current guess row is empty, we still update the order and decrement moves.
                if (oldGuess.every(letter => letter === null)) {
                    columnOrder = newOrder;
                    movesLeft--;
                    updateMovesLeft();
                    saveGameState();
                    drawColumns();
                    return;
                }

                // Update the guess row based on the new order.
                if (guesses[currentGuessIndex]) {
                    const newGuess = updateGuessRowAfterDrag(oldOrder, oldGuess, newOrder);
                    guesses[currentGuessIndex] = newGuess;
                    updateGuessRowDOM();
                }

                if (movesLeft <= 0) {
                    drawColumns();
                    return;
                }

                movesLeft--;
                updateMovesLeft();

                // Update the permanent column order and save state.
                columnOrder = newOrder;
                saveGameState();
            }
        });
    }


    function updateGuessRowLive() {

        // Update the current guess row.
        guesses[currentGuessIndex] = tempRow;

        // Update the DOM for each tile.
        for (let col = 0; col < tempRow.length; col++) {
            const tile = document.getElementById(`tile-${currentGuessIndex}-${col}`);
            if (tile) {
                tile.innerText = tempRow[col] || "";

        }
    }

    function customSmoothScrollTo(targetY, duration) {
        const startY = window.pageYOffset;
        const distance = targetY - startY;
        const startTime = performance.now();

        function scrollAnimation(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);

            // Ease in-out quadratic function
            const easeInOutQuad = progress < 0.5 ?
                2 * progress * progress :
                -1 + (4 - 2 * progress) * progress;

            window.scrollTo(0, startY + distance * easeInOutQuad);

            if (elapsed < duration) {
                requestAnimationFrame(scrollAnimation);
            }
        }
        requestAnimationFrame(scrollAnimation);
    }

    function checkGuess(guess, solution) {
        // If solution is an object, use its 'word' property.
        let solutionStr = (typeof solution === 'object' && solution.word) ? solution.word : solution;
        const feedback = ["wrong", "wrong", "wrong", "wrong", "wrong"];
        let solutionChars = solutionStr.split("");

        for (let i = 0; i < 5; i++) {
            if (guess[i] === solutionChars[i]) {
                feedback[i] = "correct";
                solutionChars[i] = null;
            }
        }
        for (let i = 0; i < 5; i++) {
            if (feedback[i] === "correct") continue;
            const letter = guess[i];
            const idx = solutionChars.indexOf(letter);
            if (idx !== -1) {
                feedback[i] = "misplaced";
                solutionChars[idx] = null;
            }
        }
        return feedback;
    }


    function makeGuess() {
        if (currentGuessIndex > guessRows) return;
        const rowArr = guesses[currentGuessIndex];
        if (rowArr.includes(null)) {
            document.getElementById("game-status").innerText = translations[currentLanguage].completeFirst;
            return;
        }
        const guess = guesses[currentGuessIndex].join("");
        const feedback = checkGuess(guess, solution);
        const _solWordForCheck = (typeof solution === 'object' ? solution.word : solution);
        const _isWinGuess = (guess === _solWordForCheck);
        trackGuessSubmitted(currentGuessIndex, _isWinGuess);
        for (let col = 0; col < 5; col++) {
            const tileId = `tile-${currentGuessIndex}-${col}`;
            const tile = document.getElementById(tileId);
            if (tile) {
                tile.classList.add(feedback[col]);
                tile.classList.add("flip");
                setTimeout(() => { tile.classList.remove("flip"); }, 300);
            }
            // If the letter was found, add it to foundLetters.
            if (feedback[col] === "correct" || feedback[col] === "misplaced") {
                foundLetters.add(guesses[currentGuessIndex][col]);
            }
            // If the letter feedback is "wrong", add it to eliminatedLetters.
            if (feedback[col] === "wrong") {
                eliminatedLetters.add(guesses[currentGuessIndex][col]);
            }
        }
        // Immediately disable the guess button to prevent extra clicks
        document.getElementById("guess-button").disabled = true;

        // WIN branch: correct guess.
        if (guess === (typeof solution === 'object' ? solution.word : solution)) {
            // Update the tiles to reflect the win.
            for (let col = 0; col < 5; col++) {
                const tileId = `tile-${currentGuessIndex}-${col}`;
                const tile = document.getElementById(tileId);
                tile.classList.remove("correct", "wrong", "misplaced");
                tile.classList.add("win");
            }

            smoothScrollToTop(2000);



            // Trigger the confetti effect on every win.
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });

            // Append the definition for non‑English games.

            let additionalText = "";
            if (currentLanguage !== "eng" && typeof solution === "object" && solution.definition) {
                additionalText += "<span class=\"winning-answer\"><br><em>Definition:</em> " + solution.definition;
                // Append a clickable link that calls showModal() with the lesson from the word object.
                // The replace call escapes any single quotes in the lesson content.
                additionalText += " (<a href='#' class='lesson-link' onclick=\"showModal('" +
                    solution.lesson.replace(/'/g, "\\'") + "'); return false;\">Word Lesson!</a>)</span><br /><br />";
            }
            let winMessage = translations[currentLanguage].foundIt + additionalText;

            // Track the win event and update game result.
            trackGameWin(currentGuessIndex);
            updateGameResult("win");

            // Update the UI with the win message.
            removeGuessButton(winMessage);
            gameCompleted = true;
            drawColumns(); // Clear selection visuals
            lockGameForToday(false);
            const downloadBtn = document.getElementById("download-result");
            if (downloadBtn) {
                downloadBtn.style.display = "inline";
            }
            renderResultCard("win", currentGuessIndex);

            // Auto-open the lesson modal if available.
            if (currentLanguage !== "eng" && typeof solution === "object" && solution.lesson) {
                showModal(solution.lesson, true);
            }
            return;
        }

        // Not a winning guess.
        currentGuessIndex++;
        if (currentGuessIndex <= guessRows) {
            saveGameState();
            drawColumns(); // Refresh columns to clear selection for the new row
        } else {
            updateGameResult("lose");
            // Prepare the loss message.
            let solWord = (typeof solution === 'object' && solution.word) ? solution.word : solution;
            let definition = (typeof solution === 'object' && solution.definition) ? solution.definition : "";
            let lossMessageTemplate = translations[currentLanguage].lossMessage;
            let lossMessage = lossMessageTemplate.replace("{word}", solWord);

            // Append the definition for non‑English games.
            if (currentLanguage !== "eng" && typeof solution === "object" && solution.definition) {
                lossMessage += "<span class=\"winning-answer\"><br><em>Definition:</em> " + solution.definition;
                // Append a clickable link that calls showModal() with the lesson from the word object.
                // The replace call escapes any single quotes in the lesson content.
                lossMessage += " (<a href='#' class='lesson-link' onclick=\"showModal('" +
                    solution.lesson.replace(/'/g, "\\'") + "'); return false;\">Word Lesson!</a>)</span><br /><br />";
            }
            removeGuessButton(lossMessage);
            gameCompleted = true;
            lockGameForToday(false);

            smoothScrollToTop(2000);

            // Show the result card in the columns area.
            renderResultCard("lose", currentGuessIndex);
            trackGameLose(currentGuessIndex);
            const downloadBtn = document.getElementById("download-result");
            if (downloadBtn) { downloadBtn.style.display = "inline"; }

            // Auto-open the lesson modal if available.
            if (currentLanguage !== "eng" && typeof solution === "object" && solution.lesson) {
                showModal(solution.lesson, true);
            }
        }
        drawColumns();
    }

        // Escape key closes any open modal (including footer popups, language picker, word lesson).

    function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
        if (typeof radius === "number") {
            radius = { tl: radius, tr: radius, br: radius, bl: radius };
        } else {
            var defaultRadius = { tl: 0, tr: 0, br: 0, bl: 0 };
            for (var side in defaultRadius) {
                radius[side] = radius[side] || defaultRadius[side];
            }
        }
        ctx.beginPath();
        ctx.moveTo(x + radius.tl, y);
        ctx.lineTo(x + width - radius.tr, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius.tr);
        ctx.lineTo(x + width, y + height - radius.br);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius.br, y + height);
        ctx.lineTo(x + radius.bl, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius.bl);
        ctx.lineTo(x, y + radius.tl);
        ctx.quadraticCurveTo(x, y, x + radius.tl, y);
        ctx.closePath();
        if (fill) {
            ctx.fill();
        }
        if (stroke) {
            ctx.stroke();
        }
    }

    function getResultRow(rowIndex) {
        if (!guesses[rowIndex] || guesses[rowIndex].includes(null)) {
            return null;
        }
        const guessStr = guesses[rowIndex].join("");
        return checkGuess(guessStr, solution);
    }

    function generateResultImage() {
        return new Promise((resolve) => {
            const canvasWidth = 1080;
            const ctx = document.createElement("canvas").getContext("2d"); // Temp context for measuring

            // Calculate Content Heights
            const logoWidth = 400;
            // We need to load the logo to get aspect ratio, but we can assume a reasonable default or wait for load.
            // Better to load logo first to get dimensions.
            const logo = new Image();
            logo.crossOrigin = "anonymous";
            logo.src = "shifty_logo_transparent.png";

            logo.onload = () => {
                const aspectRatio = logo.width / logo.height;
                const logoHeight = logoWidth / aspectRatio;

                // Grid Dimensions
                const completedRows = [];
                for (let i = 1; i <= guessRows; i++) {
                    const feedback = getResultRow(i);
                    if (feedback) completedRows.push(feedback);
                }

                // If no rows, we still want to show something? The original code alerted and returned.
                // Let's assume there's at least one row if they are sharing, or handle empty gracefully.
                const rowsToShow = completedRows.length > 0 ? completedRows.length : 1;

                const columns = 5;
                const tileGap = 15;
                const tileSize = 130;
                const gridHeight = (rowsToShow * tileSize) + ((rowsToShow - 1) * tileGap);

                // Text Heights
                const levelTextHeight = 60; // Approx space for level text
                const footerTextHeight = 150; // Approx space for footer text

                // Vertical Spacing
                const padding = 40; // Top/Bottom padding inside card
                const elementGap = 30; // Gap between elements
                const cardTopMargin = 50;
                const cardBottomMargin = 50;
                const footerTopMargin = 50;
                const footerBottomMargin = 50;

                // Calculate Card Height
                // Card Content: Padding + Logo + Gap + LevelText + Gap + Grid + Padding
                const cardContentHeight = padding + logoHeight + elementGap + levelTextHeight + elementGap + gridHeight + padding;
                const cardHeight = cardContentHeight;

                // Calculate Canvas Height
                // Canvas Content: CardTopMargin + CardHeight + FooterTopMargin + FooterTextHeight + FooterBottomMargin
                const totalHeight = cardTopMargin + cardHeight + footerTopMargin + footerTextHeight + footerBottomMargin;

                const canvasHeight = Math.ceil(totalHeight);

                // Create actual canvas
                const canvas = document.createElement("canvas");
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
                const finalCtx = canvas.getContext("2d");

                // 1. Draw Background
                const bgGradient = finalCtx.createLinearGradient(0, 0, 0, canvasHeight);
                bgGradient.addColorStop(0, "#f3f4f6");
                bgGradient.addColorStop(1, "#e5e7eb");
                finalCtx.fillStyle = bgGradient;
                finalCtx.fillRect(0, 0, canvasWidth, canvasHeight);

                // 2. Draw Card
                const cardWidth = 900;
                const cardX = (canvasWidth - cardWidth) / 2;
                const cardY = cardTopMargin;
                const cardRadius = 40;

                // Shadow
                finalCtx.shadowColor = "rgba(0, 0, 0, 0.1)";
                finalCtx.shadowBlur = 40;
                finalCtx.shadowOffsetY = 20;

                finalCtx.fillStyle = "#ffffff";
                roundRect(finalCtx, cardX, cardY, cardWidth, cardHeight, cardRadius, true, false);

                // Reset shadow
                finalCtx.shadowColor = "transparent";
                finalCtx.shadowBlur = 0;
                finalCtx.shadowOffsetY = 0;

                // 3. Draw Logo
                const logoX = (canvasWidth - logoWidth) / 2;
                const logoY = cardY + padding;
                finalCtx.drawImage(logo, logoX, logoY, logoWidth, logoHeight);

                // 4. Draw Level Text
                let levelText;
                if (guessRows === 2) levelText = "Impossible Level";
                else if (guessRows === 3) levelText = "Gold Level";
                else if (guessRows === 4) levelText = "Purple Level";
                else levelText = "Gray Level";

                const languageDisplayName = languageNames[currentLanguage] || currentLanguage;
                const combinedText = `${levelText} - ${languageDisplayName}`;

                finalCtx.font = "bold 24px Inter, sans-serif";
                finalCtx.fillStyle = "#1f2937";
                finalCtx.textAlign = "center";
                const textY = logoY + logoHeight + elementGap + 10; // Adjust baseline
                finalCtx.fillText(combinedText, canvasWidth / 2, textY);

                // 5. Draw Grid
                if (completedRows.length > 0) {
                    const gridWidth = (columns * tileSize) + ((columns - 1) * tileGap);
                    const gridX = (canvasWidth - gridWidth) / 2;
                    const gridStartY = textY + elementGap + 10;

                    for (let r = 0; r < completedRows.length; r++) {
                        const feedback = completedRows[r];
                        for (let c = 0; c < columns; c++) {
                            let fillColor;
                            if (dailyResult === "win" && r === completedRows.length - 1) {
                                fillColor = "#10b981";
                            } else {
                                switch (feedback[c]) {
                                    case "correct":
                                        fillColor = "#10b981";
                                        break;
                                    case "misplaced":
                                        fillColor = "#f59e0b";
                                        break;
                                    case "wrong":
                                    default:
                                        fillColor = "#4b5563";
                                        break;
                                }
                            }

                            const tileX = gridX + c * (tileSize + tileGap);
                            const tileY = gridStartY + r * (tileSize + tileGap);

                            finalCtx.fillStyle = fillColor;
                            roundRect(finalCtx, tileX, tileY, tileSize, tileSize, 12, true, false);
                        }
                    }
                }

                // 6. Draw Footer Text
                // 6. Draw Footer Text
                let resultText;
                if (dailyResult === "win") {
                    resultText = "I beat ShiftyWords.com today!\nCan you make it to Impossible?";
                } else {
                    resultText = "ShiftyWords.com beat me today.\nCan you do better?";
                }

                const lines = resultText.split("\n");
                finalCtx.font = "bold 42px Inter, sans-serif";
                finalCtx.fillStyle = "#1f2937";
                finalCtx.textAlign = "center";
                const footerY = cardY + cardHeight + footerTopMargin + 20; // Start of footer text

                lines.forEach((line, i) => {
                    finalCtx.fillText(line, canvasWidth / 2, footerY + (i * 55));
                });

                resolve(canvas.toDataURL("image/png"));
            };

            logo.onerror = (err) => {
                console.error("Error loading logo:", err);
                resolve(null); // Or handle error appropriately
            };
        });
    }

                                // If user cancels or share fails, we don't necessarily need to download, 
                                // but if it was a technical error maybe we should.

                                // or we could fallback. Let's fallback on error just in case.
                                if (err.name !== 'AbortError') {
                                    triggerDownload(dataUrl);
                                }
                            });
                        } else {
                            triggerDownload(dataUrl);
                        }
                    });
            } else {
                triggerDownload(dataUrl);
            }
        });
    });

    <script>
    // ---------- Analytics helpers ----------
    // Every event gets language, current win streak, current level, and daily streak
    // automatically attached, so dashboards can slice without us remembering each time.
    function trackEvent(name, params) {
        try {
            var winStreak = (typeof getWinStreak === "function") ? getWinStreak() : 0;
            var level = (typeof determineLevel === "function") ? determineLevel(winStreak) : "unknown";
            var dailyStreak = parseInt(getLangCookie("DSG_streak") || "0", 10) || 0;
            var base = {
                event_category: 'Game',
                game_language: currentLanguage,
                level: level,
                win_streak: winStreak,
                daily_streak: dailyStreak,
                app_version: appVersion
            };
            var merged = Object.assign({}, base, params || {});
            gtag('event', name, merged);
        } catch (e) {
            console.warn("trackEvent failed:", e);
        }
    }

    function trackGameStart() {
        trackEvent('game_start', {
            event_label: 'Game Start',
            starting_moves: (typeof startingMoves !== "undefined") ? startingMoves : null,
            guess_rows: (typeof guessRows !== "undefined") ? guessRows : null
        });
    }

    function trackGameWin(attempts) {
        var movesUsed = (typeof startingMoves !== "undefined" && typeof movesLeft !== "undefined") ?
            (startingMoves - movesLeft) : null;
        trackEvent('game_win', {
            event_label: 'Game Win',
            attempts: attempts,
            moves_used: movesUsed,
            moves_remaining: (typeof movesLeft !== "undefined") ? movesLeft : null
        });
        // Streak milestone events fire on win after the streak updates.
        try {
            var newStreak = parseInt(getLangCookie("DSG_winStreak") || "0", 10) || 0;
            var milestones = [3, 6, 10, 25, 50, 100];
            if (milestones.indexOf(newStreak) !== -1) {
                trackEvent('streak_milestone', { event_label: 'Win Streak ' + newStreak, milestone: newStreak });
            }
        } catch (e) {}
    }

    function trackGameLose(attempts) {
        var movesUsed = (typeof startingMoves !== "undefined" && typeof movesLeft !== "undefined") ?
            (startingMoves - movesLeft) : null;
        trackEvent('game_lose', {
            event_label: 'Game Lose',
            attempts: attempts || null,
            moves_used: movesUsed,
            moves_remaining: (typeof movesLeft !== "undefined") ? movesLeft : null
        });
    }

    function trackGuessSubmitted(attemptNumber, isWin) {
        trackEvent('guess_submitted', {
            event_label: 'Guess Submitted',
            attempt_number: attemptNumber,
            is_win: !!isWin,
            moves_remaining: (typeof movesLeft !== "undefined") ? movesLeft : null
        });
    }

    function trackLanguageChanged(fromLang, toLang) {
        trackEvent('language_changed', {
            event_label: 'Language Changed',
            from_language: fromLang,
            to_language: toLang
        });
    }

    function trackHintUsed() {
        trackEvent('hint_used', { event_label: 'Hint Used' });
    }

    function trackColumnMoved() {
        trackEvent('column_moved', {
            event_label: 'Column Moved',
            moves_remaining: (typeof movesLeft !== "undefined") ? movesLeft : null
        });
    }

    function trackModalOpened(which) {
        trackEvent('modal_opened', { event_label: 'Modal Opened: ' + which, modal: which });
    }

    function trackShareClicked() {
        trackEvent('share_clicked', { event_label: 'Share Clicked' });
    }

    function trackSessionResumed() {
        trackEvent('session_resumed', { event_label: 'Session Resumed' });
    }

    // ---------- Result card (the answer reveal in the columns area) ----------
    var _resultCountdownTimer = null;

    function startResultCountdown(el) {
        if (!el) return;
        function pad(n) { return n < 10 ? "0" + n : "" + n; }
        function tick() {
            var now = new Date();
            var midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0, 0);
            var diff = Math.max(0, midnight - now);
            var hours = Math.floor(diff / 3600000);
            var minutes = Math.floor((diff % 3600000) / 60000);
            var seconds = Math.floor((diff % 60000) / 1000);
            el.innerHTML = "Next puzzle in <strong>" + pad(hours) + ":" + pad(minutes) + ":" + pad(seconds) + "</strong>";
        }
        tick();
        if (_resultCountdownTimer) clearInterval(_resultCountdownTimer);
        _resultCountdownTimer = setInterval(tick, 1000);
    }

    function renderResultCard(outcome, attempts) {
        var card = document.getElementById("result-card");
        if (!card) return;
        var solWord = (typeof solution === "object" && solution && solution.word) ? solution.word : solution;
        var definition = (typeof solution === "object" && solution && solution.definition) ? solution.definition : "";
        var lesson = (typeof solution === "object" && solution && solution.lesson) ? solution.lesson : "";
        var t = (typeof translations !== "undefined" && translations[currentLanguage]) ? translations[currentLanguage] : {};
        var winStreak = getWinStreak();
        var dailyStreak = parseInt(getLangCookie("DSG_streak") || "0", 10) || 0;
        var movesUsed = (typeof startingMoves !== "undefined" && typeof movesLeft !== "undefined") ? Math.max(0, startingMoves - movesLeft) : null;

        var headline = outcome === "win" ? (t.foundIt || "You got it!") : (t.shucks || "Good try.");
        var eyebrow = outcome === "win" ? "Solved" : "Today's word";

        var html = "";
        html += '<div class="result-eyebrow">' + eyebrow + '</div>';
        html += '<div class="result-headline">' + headline + '</div>';
        html += '<div class="result-word">' + solWord + '</div>';

        if (currentLanguage !== "eng" && definition) {
            html += '<div class="result-definition"><em>Definition.</em> ' + definition;
            if (lesson) {
                var safeLesson = lesson.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                html += ' <a href="#" class="lesson-link" onclick="showModal(\'' + safeLesson + '\', false); return false;">Open word lesson</a>';
            }
            html += '</div>';
        }

        html += '<div class="result-stats">';
        if (outcome === "win" && attempts) {
            html += '<span class="stat"><span class="stat-value">' + attempts + '</span> tries</span>';
        }
        if (movesUsed !== null) {
            html += '<span class="stat"><span class="stat-value">' + movesUsed + '</span> moves used</span>';
        }
        html += '<span class="stat"><span class="stat-value">' + winStreak + '</span> win streak</span>';
        html += '<span class="stat"><span class="stat-value">' + dailyStreak + '</span> day streak</span>';
        html += '</div>';

        html += '<div class="result-countdown" id="result-countdown">Next puzzle in <strong>--:--:--</strong></div>';

        card.classList.remove("hidden", "won", "lost");
        card.classList.add(outcome === "win" ? "won" : "lost");
        card.innerHTML = html;

        // Hide the letter selection grid so the card takes its place visually.
        var columns = document.getElementById("columns-container");
        if (columns) columns.classList.add("hidden");

        startResultCountdown(document.getElementById("result-countdown"));
    }
    // Example function to get the user's win streak from localStorage (or default to 0)
    function getWinStreak() {
        var streak = parseInt(getLangCookie("DSG_winStreak") || "0", 10);
        return isNaN(streak) ? 0 : streak;
    }

    // Determine level class based on win streak thresholds.
    function determineLevel(winStreak) {
        if (winStreak < 3) {
            return "level-gray";
        } else if (winStreak < 6) {
            return "level-purple";
        } else if (winStreak < 10) {
            return "level-gold";
        } else {
            return "level-impossible";
        }
    }

    // Map level class to a display text.
    function levelLabelText(levelClass) {
        switch (levelClass) {
            case "level-gray":
                return "Gray Level";
            case "level-purple":
                return "Purple Level";
            case "level-gold":
                return "Gold Level";
            case "level-impossible":
                return "Impossible Level";
            default:
                return "";
        }
    }

    function updateLogoLevel(result) {
        const container = document.getElementById("logoContainer");
        const label = document.getElementById("currentLevelLabel");

        if (result === "lose") {
            // On a loss, reset to Gray Level.
            container.classList.remove("level-gray", "level-purple", "level-gold", "level-impossible");
            container.classList.add("level-gray");
            label.textContent = "Gray Level";
            currentLevelClass = "level-gray";
        } else if (result === "win") {
            // On a win, determine the new level based on win streak.
            const winStreak = parseInt(getLangCookie("DSG_winStreak") || "0", 10);
            const newLevelClass = determineLevel(winStreak + 1);

            // If the level has changed, celebrate!
            if (newLevelClass !== currentLevelClass) {
                celebrateLevelUp();
            }

            // Update logo and label.
            container.classList.remove("level-gray", "level-purple", "level-gold", "level-impossible");
            container.classList.add(newLevelClass);
            label.textContent = levelLabelText(newLevelClass);
            currentLevelClass = newLevelClass;
        }
    }

    function celebrateLevelUp() {
        // Add a temporary class to animate the logo.
        const container = document.getElementById("logoContainer");
        container.classList.add("celebrate-logo");
        // Remove the class after the animation (2 seconds)
        setTimeout(() => {
            container.classList.remove("celebrate-logo");
        }, 2000);
    }
    // Function to show the modal with given content
    // Updated showModal function with optional delay for auto openings
    function showModal(content, autoOpen) {
        const modal = document.getElementById('wordModal');
        const modalContent = document.getElementById('modalContent');

        // Function to actually display the modal
        const displayModal = () => {
            modalContent.innerHTML = content;
            modal.style.display = 'flex';
            // Remove and re-add the fade-in class to trigger the animation
            modal.classList.remove('fade-in');

            modal.classList.add('fade-in');

        if (autoOpen) {
            setTimeout(displayModal, 2000);
        } else {
            displayModal();
        }

    }

    function smoothScrollToTop(duration) {
        const startY = window.pageYOffset;
        const startTime = performance.now();

        function scrollAnimation(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);

            // Ease function: easeInOutQuad
            const easeInOutQuad = progress < 0.5 ?
                2 * progress * progress :
                -1 + (4 - 2 * progress) * progress;

            window.scrollTo(0, startY * (1 - easeInOutQuad));

            if (elapsed < duration) {
                requestAnimationFrame(scrollAnimation);
            }
        }

        requestAnimationFrame(scrollAnimation);
    }


    // Close modal event listener
    document.getElementById('closeModal').addEventListener('click', function() {
        hideModal();
        // Set a flag so the modal will not auto-open again
        localStorage.setItem('modalShown', 'true');
    });

    // Allow user to click on the word definition to re-open the modal.
    // Assume each word definition is in an element with the class "definition" and
    // a data attribute "data-lesson" that holds the lesson content.
    document.querySelectorAll('.definition').forEach(function(el) {
        el.addEventListener('click', function() {
            var content = el.getAttribute('data-lesson');
            if (content) {
                showModal(content);
            }
        });
    });
    </script>
